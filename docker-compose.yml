
version: "3.8"
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: ./backend
    command: celery -A app.worker.celery_app.celery worker --loglevel=info
    depends_on:
      - redis

  redis:
    image: redis:7

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
