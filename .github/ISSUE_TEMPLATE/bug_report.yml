name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Please fill in the details below.
  - type: input
    id: version
    attributes:
      label: cortexops version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect to happen vs what actually happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Paste the smallest code snippet that reproduces the bug.
      render: python
    validations:
      required: true
  - type: textarea
    id: traceback
    attributes:
      label: Full traceback
      render: text
