name: CortexOps eval gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"   # daily regression sweep at 06:00 UTC

jobs:
  sdk-tests:
    name: SDK unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install SDK dev dependencies
        run: |
          cd sdk
          pip install -e ".[dev]"

      - name: Run SDK tests
        run: |
          cd sdk
          pytest tests/ -v --tb=short

  eval-gate:
    name: Eval gate — payments agent
    runs-on: ubuntu-latest
    needs: sdk-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e sdk/
          pip install pyyaml

      - name: Run eval suite
        run: |
          cd examples/langgraph_payments
          python run_eval.py \
            --dataset golden_v1.yaml \
            --fail-on "task_completion < 0.85" \
            --output eval_results.json \
            --quiet

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ github.sha }}
          path: examples/langgraph_payments/eval_results.json
          retention-days: 30

      - name: Post eval summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(
              fs.readFileSync('examples/langgraph_payments/eval_results.json', 'utf8')
            );
            const icon = results.failed === 0 ? '✅' : '❌';
            const body = [
              `## ${icon} CortexOps eval — ${results.project}`,
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| Task completion | ${(results.task_completion_rate * 100).toFixed(1)}% |`,
              `| Tool accuracy | ${results.tool_accuracy.toFixed(1)}/100 |`,
              `| Latency p95 | ${results.latency_p95_ms.toFixed(0)}ms |`,
              `| Passed / Total | ${results.passed} / ${results.total_cases} |`,
              '',
              results.failed > 0
                ? `### Failed cases\n${results.case_results.filter(r => !r.passed).map(r => `- \`${r.case_id}\`: ${r.failure_kind || 'unknown'} (score ${r.score.toFixed(0)})`).join('\n')}`
                : '_All cases passed._',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check sdk/cortexops backend/app --line-length 121
